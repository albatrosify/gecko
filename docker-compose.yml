services:
  app:
    image: ghcr.io/albatrosify/gecko:latest
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-open_iptv}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      - APP_URL=${APP_URL}
      - CACHE_DIR=/app/data/cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - app-data:/app/data
      - cache-data:/app/data/cache
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
  cache-data:
  app-data:
