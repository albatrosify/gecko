# Default/development setup — no VPN. Do NOT merge VPN or gluetun config from docker-compose.prod.yml into this file.
services:
  app:
    image: ghcr.io/albatrosify/gecko:latest
    ports:
      - "3000:3000"
    environment:
      - SQLITE_PATH=/app/data/gecko.db
      - JWT_SECRET=${JWT_SECRET:-}
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      - APP_URL=${APP_URL:-}
      - VITE_APP_COMMIT_HASH=${VITE_APP_COMMIT_HASH:-unknown}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
