# Production setup with Gluetun VPN. This is separate from docker-compose.yml — do NOT merge these two files.
services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "3000:3000"
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-nordvpn}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-Netherlands}
    networks:
      - app-net
    restart: unless-stopped

  app:
    image: registry.homgsa.de/marius/open-itptv-editor:${IPTV_VERSION:-latest}
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - SQLITE_PATH=/app/data/gecko.db
      - JWT_SECRET=${JWT_SECRET:-}
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      - APP_URL=${APP_URL:-}
      - VITE_APP_COMMIT_HASH=${VITE_APP_COMMIT_HASH:-unknown}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./data/app:/app/data
    restart: unless-stopped

networks:
  app-net:
